<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Waste Management Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(90deg,#08185d,#094d72,#1488a3);
    min-height:100vh;
    padding:20px;
}

.dashboard{
    width:100%;
    min-height:95vh;
    border:3px solid rgba(255,255,255,.2);
    border-radius:35px;
    padding:30px;
    backdrop-filter: blur(10px);
}

.header{
    display:grid;
    grid-template-columns:520px 1fr;
    gap:40px;
    align-items:center;
    margin-bottom:30px;
}

.logo-box{
    background:#fff;
    height:170px;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.logo-box img{
    max-width:90%;
    max-height:90%;
    object-fit:contain;
}

.title-section h1{
    color:#fff;
    font-size:80px;
    font-weight:900;
    letter-spacing:2px;
}

.info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
    color:#fff;
    font-size:28px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.card{
    border-radius:25px;
    padding:20px;
    border:2px solid rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.card-header{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:20px;
}

.circle{
    width:52px;
    height:52px;
    border-radius:50%;
}

.orange{
    background:#be7a43;
    box-shadow:0 0 20px #be7a43;
}

.green{
    background:#36d14b;
    box-shadow:0 0 20px #36d14b;
}

.blue{
    background:#2689ff;
    box-shadow:0 0 20px #2689ff;
}

.yellow{
    background:#ffd000;
    box-shadow:0 0 20px #ffd000;
}

.red{
    background:#ff2020;
    box-shadow:0 0 20px #ff2020;
}

.card-title{
    color:white;
    font-size:30px;
    font-weight:700;
}

.input-container{
    position:relative;
}

.input-container input{
    width:100%;
    height:80px;
    border:none;
    border-radius:20px;
    padding:0 110px 0 20px;
    font-size:32px;
    font-weight:700;
    outline:none;
}

.unit{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:28px;
    font-weight:900;
}

.dry{
    background:rgba(92,73,102,0.45);
    border-color:#9d8f99;
}

.wet{
    background:rgba(31,155,112,0.4);
    border-color:#4fc57a;
}

.ewaste{
    background:rgba(39,128,226,0.4);
    border-color:#54a5ff;
}

.plastic{
    background:rgba(160,147,44,0.4);
    border-color:#d7c86b;
}

.recycle{
    background:rgba(23,180,137,0.4);
    border-color:#57e7af;
}

.hazard{
    background:rgba(145,70,82,0.4);
    border-color:#d8525c;
}

.recycle-icon{
    font-size:48px;
}

.total-container{
    margin-top:30px;
    padding:18px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.25);
}

.total-box{
    background:white;
    border-radius:18px;
    min-height:90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.total-title{
    font-size:28px;
    font-weight:900;
}

.total-value{
    font-size:46px;
    font-weight:900;
}

/* @media(max-width:1200px){

    .header{
        grid-template-columns:1fr;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .title-section h1{
        font-size:50px;
    }

    .info-row{
        flex-direction:column;
        gap:10px;
        align-items:flex-start;
    }
}
*/
html,body{width:100%;height:100%;overflow:hidden;}
body{display:flex;justify-content:center;align-items:center;padding:0;}
.dashboard{width:100%;height:auto;min-height:100vh;padding:20px;}
.header{grid-template-columns:420px 1fr;}
.title-section h1{font-size:64px;}
.cards{grid-template-columns:repeat(3,1fr);}

.cards{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;grid-auto-rows:auto;gap:24px!important;}
body{overflow:hidden!important;}
</style>
</head>
<body>
<div class="dashboard">
<div class="header">
<div class="logo-box">
<img alt="Company Logo" id="companyLogo"/>
</div>
<div class="title-section">
<h1>WASTE MANAGEMENT</h1>
<div class="info-row">
<div>
                    Date:
                    <input id="todayDate" placeholder="DD/MM/YYYY" style="font-size:26px;padding:8px 12px;border-radius:10px;border:none;" type="text" value="20/07/2026"/>
</div>
</div>
</div>
</div>
<div class="cards">
<div class="card dry">
<div class="card-header">
<div class="circle orange"></div>
<div class="card-title">Dry Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
<div class="card wet">
<div class="card-header">
<div class="circle green"></div>
<div class="card-title">Wet Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
<div class="card ewaste">
<div class="card-header">
<div class="circle blue"></div>
<div class="card-title">E-Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
<div class="card plastic">
<div class="card-header">
<div class="circle yellow"></div>
<div class="card-title">Plastic Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
<div class="card recycle">
<div class="card-header">
<div class="recycle-icon">♻</div>
<div class="card-title">Food Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
<div class="card hazard">
<div class="card-header">
<div class="circle red"></div>
<div class="card-title">Hazardous Waste</div>
</div>
<div class="input-container">
<input class="wasteInput" type="number"/>
<div class="unit">KG</div>
</div>
</div>
</div>
<div class="total-container">
<div class="total-box">
<div class="total-title">
                TOTAL WASTE GENERATED TODAY
            </div>
<div class="total-value" id="totalValue">
                0 KG
            </div>
</div>
</div>
</div>
<script>

/* ===========================
   PUT YOUR LOGO URL HERE
=========================== */

const logoUrl = "https://tse4.mm.bing.net/th/id/OIP.CZtmhzTvTCNsBeAWZ7BhigHaEK?r=0&w=1536&h=864&rs=1&pid=ImgDetMain&o=7&rm=3";

document.getElementById("companyLogo").src = logoUrl;

/* ===========================
   DATE
=========================== */

// manual date textbox

/* ===========================
   TOTAL CALCULATION
=========================== */

const inputs = document.querySelectorAll(".wasteInput");
const totalBox = document.getElementById("totalValue");

function calculateTotal(){

    let total = 0;

    inputs.forEach(input=>{
        total += parseFloat(input.value) || 0;
    });

    totalBox.innerHTML = total.toFixed(2) + " KG";
}

inputs.forEach(input=>{
    input.addEventListener("input", calculateTotal);
});

</script>
</body>
</html>

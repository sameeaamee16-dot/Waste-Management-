<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waste Management Dashboard</title>



<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    min-height:100%;
    min-width:1920px;
    background:linear-gradient(135deg,#04145b,#045372,#0d8aa4);
}

body{
    padding:15px;
    overflow:hidden;
}

.dashboard{
    
  width:100%;
    min-height:calc(100vh - 30px);
    margin:auto;

    border:2px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:15px;
}

/* HEADER */

.header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:15px;
}

.logo-box{
    width:280px;
    height:100px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.title{
    color:white;
    font-size:55px;
    font-weight:900;
}

/* DATE */

.date-row{
    margin-bottom:15px;
    color:white;
    font-size:26px;
    font-weight:bold;
}

.date-row input{
    width:250px;
    height:42px;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-size:18px;
    margin-left:8px;
}

/* MAIN CONTENT */

.main-content{
    display:grid;
    grid-template-columns:55% 45%;
    gap:20px;
}

/* WASTE SIDE */

.waste-section{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.card{
    padding:8px;
    border-radius:16px;
    color:white;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

.card-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
}

.input-row{
    position:relative;
}

.input-row input{
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;
    padding:10px 75px 10px 15px;
    font-size:20px;
    font-weight:700;
}

.unit{
    position:absolute;
    right:15px;
    top:12px;
    font-size:20px;
    color:#444;
    font-weight:900;
}

/* COLORS */

.dry{
    background:#9C6B30;
}

.wet{
    background:#22B14C;
}

.ewaste{
    background:#2E86FF;
}

.plastic{
    background:#E6B800;
}

.recyclable{
    background:#00B894;
}

.hazardous{
    background:#E53935;
}

/* CHART */

.chart-panel{
    background:white;
    margin-right: 1.5rem;
    border-radius:20px;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.chart-title{
    text-align:center;
    font-size:28px;
    font-weight:800;
    margin-bottom:10px;
}

.chart-container{
    height:420px;
}

/* TOTAL */

.total-section{
    margin-top:10px;
    background:white;
    border-radius:18px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total-title{
    font-size:28px;
    font-weight:900;
}

.total-value{
    font-size:42px;
    font-weight:900;
    color:#003c96;
}

.main-content{
    display:grid;
    grid-template-columns:55% 45%;
    gap:20px;
    align-items:stretch;
}

.chart-panel{
    min-height:500px;
}

.total-section{
    position:relative;
    z-index:5;
}
.main-content{
    display:grid;
    grid-template-columns:55% 45% !important;
    gap:20px;
}
.dot{
    width:22px;
    height:22px;
    border-radius:50%;
    display:inline-block;
    margin-right:10px;
    vertical-align:middle;
    border:2px solid white;
}


.brown{
    background:#e0b47a;
    border:2px solid white;
}

.green{
    background:#7dff9a;
}

.blue{
    background:#64adff;
}

.yellow{
    background:#ffe76b;
}

.teal{
    background:#74ffe5;
}

.red{
    background:#ff8787;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

    <div class="header">

        <div class="logo-box">
<img
src="https://tse4.mm.bing.net/th/id/OIP.CZtmhzTvTCNsBeAWZ7BhigHaEK?r=0&w=1536&h=864&rs=1&pid=ImgDetMain&o=7&rm=3"
alt="Logo">
</div>

        <div class="title">
            WASTE MANAGEMENT
        </div>

    </div>

    <div class="date-row">
        Date :
        <input type="text" placeholder="Enter Date">
    </div>

    <div class="main-content">

        <div class="waste-section">

            <div class="card dry">
                <div class="card-title">
    <span class="dot brown"></span>
    Dry Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

            <div class="card wet">
                <div class="card-title">
    <span class="dot green"></span>
    Wet Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

            <div class="card ewaste">
                <div class="card-title">
    <span class="dot blue"></span>
    E-Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

            <div class="card plastic">
                <div class="card-title">
    <span class="dot yellow"></span>
    Plastic Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

            <div class="card recyclable ">
                <div class="card-title">
    <span class="dot teal"></span>
    Food Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

            <div class="card hazardous">
                <div class="card-title">
    <span class="dot red"></span>
    Hazardous Waste
</div>
                <div class="input-row">
                    <input type="number" class="wasteInput">
                    <span class="unit">KG</span>
                </div>
            </div>

        </div>

        <div class="chart-panel">

            <div class="chart-title">
                Waste Distribution
            </div>

            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>

        </div>

    </div>

    <div class="total-section">

        <div class="total-title">
            TOTAL WASTE GENERATED TODAY
        </div>

        <div id="totalWaste" class="total-value">
            0 KG
        </div>

    </div>

</div>

<script>

const wasteInputs = document.querySelectorAll('.wasteInput');
const totalWasteElement =
document.getElementById('totalWaste');

const pieChart = new Chart(
document.getElementById('pieChart'),
{
    type:'pie',
    data:{
        labels:[
            'Dry Waste',
            'Wet Waste',
            'E-Waste',
            'Plastic Waste',
            'Food Waste',
            'Hazardous Waste'
        ],
        datasets:[{
            data:[0,0,0,0,0,0],
            backgroundColor:[
                '#9C6B30',
                '#22B14C',
                '#2E86FF',
                '#E6B800',
                '#00B894',
                '#E53935'
            ]
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
            legend:{
                position:'bottom'
            }
        }
    }
}
);

function updateDashboard(){

    let values = [];
    let total = 0;

    wasteInputs.forEach(input=>{

        const value =
        parseFloat(input.value) || 0;

        values.push(value);

        total += value;

    });

    totalWasteElement.textContent =
        total.toFixed(2) + ' KG';

    pieChart.data.datasets[0].data =
        values;

    pieChart.update();
}

wasteInputs.forEach(input=>{

    input.addEventListener(
        'input',
        updateDashboard
    );

});

updateDashboard();

</script>

</body>
</html>
